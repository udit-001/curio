# GoReleaser config for curio.
# Docs: https://goreleaser.com
#
# Local dry-run:   goreleaser release --snapshot --clean
# Validate config:  goreleaser check
# Full release:     triggered by `git tag v0.x.x && git push --tags`

version: 2

project_name: curio

before:
  hooks:
    - go install github.com/tc-hib/go-winres@latest
    - ./scripts/gen-winres.sh {{ .Version }}

builds:
  - id: curio
    main: ./cmd/curio
    binary: curio
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'
      - '^ci:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  github:
    owner: udit-001
    name: curio
  prerelease: auto
  name_template: 'v{{ .Version }}'
